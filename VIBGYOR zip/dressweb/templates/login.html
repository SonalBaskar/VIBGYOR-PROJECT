<!DOCTYPE html>
<html>
<head>
    <title>VIBGYOR Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bgVideo">
    <source src="{{ url_for('static', filename='animation.mp4') }}" type="video/mp4">
</video>
<img src="{{ url_for('static', filename='logo.jpeg') }}" alt="VIBGYOR Logo" class="logo">

<div class="login-box">

    <h2>LOGIN TO VIBGYOR</h2>
    <p>Welcome back! Please login to continue</p>

    <!-- EMAIL LOGIN -->
    <form action="/login" method="POST">
        <input type="email" name="email" placeholder="Email ID" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="divider">
        <span>or continue with</span>
    </div>

    <!-- GOOGLE LOGIN (OUTSIDE FORM ✅) -->
    <div class="google-container">
        <a class="google-btn" href="/login/google">
            Continue with Google
        </a>
    </div>

    <!-- SIGNUP LINK -->
    <p class="signup-text">
        Don't have an account?
        <a href="/signup">Sign Up</a>
    </p>

</div>

</body>
</html>
<style>
    /* Background video */
#bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1;
}

/* Main box */
.login-box {
    width: 350px;
    margin: 100px auto;
    padding: 30px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.15);
}

/* Inputs */
.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* Login button */
.login-btn {
    width: 100%;
    padding: 10px;
    background: #000;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* Divider */
.divider {
    margin: 15px 0;
    color: #555;
}

/* Google button container */
.google-container {
    display: flex;
    justify-content: center;
}

/* Google button */
.google-btn {
    display: inline-block;
    padding: 10px 20px;
    background-color: white;
    color: black;
    text-decoration: none;   /* 🔥 removes underline */
    border-radius: 5px;
    border: 1px solid #ccc;
    font-weight: bold;
}

/* Hover */
.google-btn:hover {
    background-color: #f1f1f1;
}

/* Signup text */
.signup-text {
    margin-top: 15px;
}
a{
    color:#bfd8ee;
}
span{
    color: #000;
}
</style>
