<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIBGYOR NEW OUTFIT Advisor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top, #1e1e2f, #0f0f1a);
overflow:hidden;
}
.logo{
    position:fixed;
    top:15px;
    left:20px;

    width:110px;
    height:auto;

    z-index:999;
}
/* FLOATING LIGHTS */
body::before, body::after{
content:"";
position:absolute;
width:300px;
height:300px;
border-radius:50%;
filter:blur(120px);
animation: float 8s infinite alternate;
}

body::before{
background:#ff6ec4;
top:10%;
left:10%;
}

body::after{
background:#7873f5;
bottom:10%;
right:10%;
}

@keyframes float{
0%{transform:translateY(0px);}
100%{transform:translateY(50px);}
}

/* HEADER */
.header{
text-align:center;
font-size:32px;
font-weight:700;
margin-top:30px;

/* GRADIENT TEXT */
background: linear-gradient(90deg,#362b63,#3f3a55,#565267,#362f65);

color:transparent;
animation: glow 3s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff7eb3;}
to{text-shadow:0 0 25px #42e695;}
}

/* CENTER */
.container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* CARD */
.card{
width:420px;
padding:30px;
border-radius:20px;

/* GLASS */
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);

box-shadow:0 20px 50px rgba(0,0,0,0.5);
transition:0.4s;
color:rgb(14, 1, 1);
}

/* HOVER DEPTH */
.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 30px 70px rgba(0,0,0,0.7);
}

select{
width:100%;
padding:12px;
margin-top:12px;
border-radius:12px;
border:none;
outline:none;

/* FIXED VISIBILITY */
background:rgba(255,255,255,0.9);
color:#333;
font-size:14px;
font-weight:500;
}

/* Dropdown options (important) */
select option{
color:#000;
background:#fff;
}

/* SKIN PREVIEW */
.select-box{
display:flex;
align-items:center;
gap:10px;
margin-top:15px;
}

.preview{
width:35px;
height:35px;
border-radius:50%;
border:2px solid white;
box-shadow:0 0 10px white;
}

/* BUTTON */
button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:12px;

background: linear-gradient(45deg,#ff7eb3,#ff758c,#42e695);
color:rgb(233, 226, 226);
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 20px #ff7eb3,0 0 30px #42e695;
}

/* COLORS */
.colors{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-top:20px;
justify-content:center;
}
#bgVideo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}
/* COLOR ORBS */
.color-box{
width:45px;
height:45px;
border-radius:50%;
position:relative;
cursor:pointer;
transition:0.4s;
}

/* GLOW EFFECT */
.color-box::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
filter:blur(10px);
opacity:0;
transition:0.4s;
}

.color-box:hover{
transform:scale(1.3);
}

.color-box:hover::before{
opacity:1;
background:inherit;
}

/* RESULT */
.result{
margin-top:20px;
text-align:center;
}
h1{
    color: white;
}
</style>
</head>

<body>
<video autoplay muted loop id="bgVideo">
    <source src="/static/blue gown.mp4" type="video/mp4">
</video>

<div class="header"> </div>

<img src="{{ url_for('static', filename='logo.jpeg') }}" alt="VIBGYOR Logo" class="logo">

<div class="container">
<div class="card">
<h1>Smart Outfit Advisor</h1>
<select id="type" onchange="loadCountries()">
<option value="">Dress Type</option>
<option value="traditional">Traditional</option>
<option value="casual">Casual</option>
<option value="formal">Formal</option>
<option value="party">Party</option>
<option value="office">office</option>
<option value="Date">Date</option>
<option value="Get together">Get together</option>
<option value="Farewell">Farewell</option>
<option value="Interview">Interview</option>
<option value="Valentine Day">Valentine Day</option>

</select>

<select id="country" style="display:none;"></select>

<div class="select-box">
<div id="skinPreview" class="preview"></div>
<select id="skin" onchange="updateSkinPreview()">
<option value="">Skin Tone</option>
<option value="fair">Fair</option>
<option value="light">Light</option>
<option value="medium">Medium</option>
<option value="olive">Olive</option>
<option value="brown">Brown</option>
<option value="dark">Dark</option>
</select>
</div>

<button onclick="suggest()">Get Suggestion</button>

<div id="result" class="result"></div>

</div>
</div>

/* LOAD COUNTRIES */
function loadCountries(){
let type=document.getElementById("type").value;
let box=document.getElementById("country");

if(type==="traditional"){
box.style.display="block";
box.innerHTML="<option>Select Country</option>";
countries.forEach(c=>box.innerHTML+=`<option>${c}</option>`);
}else{
box.style.display="none";
}
}

function updateSkinPreview(){
let s=document.getElementById("skin").value;
document.getElementById("skinPreview").style.background=skinMap[s]||"transparent";
}

if(skin==="fair"||skin==="light") return base.fair;
if(skin==="medium"||skin==="olive") return base.medium;
return base.dark;

}

/* MAIN */
function suggest(){

let type=document.getElementById("type").value;
let country=document.getElementById("country").value;
let skin=document.getElementById("skin").value;
let result=document.getElementById("result");

if(!type||!skin){
result.innerHTML="Select all fields";
return;
}

let colors;

if(type==="traditional"){
if(!country){
result.innerHTML="Select country";
return;
}
colors=getColors(country,skin);
}else{
colors=getColors("default",skin);
}

result.innerHTML=`
<h3>✨ Perfect Colors</h3>
<div class="colors">
${colors.map(c=>`<div class="color-box" style="background:${c}"></div>`).join("")}
</div>
`;

}

</script>
